services:
  # ─── PostgreSQL 16 + PostGIS + pgvector (pre-built, no runtime apt-get) ───
  db:
    build:
      context: ./scripts/db
      dockerfile: Dockerfile
    image: theosphere/postgis-pgvector:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-theosphere}
      # REQUIRED — no default. Generate with: ./scripts/generate-secrets.sh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-theosphere_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ─── Redis (cache + Pub/Sub bus) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # If REDIS_PASSWORD is set, require auth. Otherwise run without (dev only).
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes;
        else
          redis-server --appendonly yes;
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG;
          else
            redis-cli ping | grep -q PONG;
          fi
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── TheoSphere backend (NestJS) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: theosphere/backend:latest
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3002
      # Compose-internal connection: backend → db over the user-defined network.
      DATABASE_URL: postgresql://${POSTGRES_USER:-theosphere}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-theosphere_db}
      DIRECT_URL: postgresql://${POSTGRES_USER:-theosphere}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-theosphere_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3002:3002"
    # Wait for both infra services to report healthy before booting the app.
    # `service_healthy` blocks until the container's HEALTHCHECK passes.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

# fly.toml app configuration file generated for theosphere-backend

app = "theosphere-backend"
primary_region = "gru" # São Paulo, nearest to the user in Brazil

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
